<!DOCTYPE html>
<html lang="he">
<head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מערכת מעקב ימי מילואים</title>
    <link rel="stylesheet" href="style.css">
</head><body>

    <div id="loginBox">

        <h1>🪖 Reserve Tracker</h1>

        <h3>ברוכים הבאים למערכת ניהול ימי מילואים</h3>

        <input
            type="email"
            id="emailInput"
            placeholder="הכנס כתובת מייל"
        >

        <button onclick="login()">
            כניסה למערכת
        </button>

    </div>

    <div id="app" style="display:none">

        <h1>מערכת מעקב ימי מילואים</h1>

        <h3 id="userEmail"></h3>
        <button onclick="logout()">
             התנתק
        </button>

        <div class="form-container">

            <input type="date" id="date">

            <input type="text" id="unit" placeholder="יחידה">

            <select id="activity">
                <option>אימון</option>
                <option>מבצעי</option>
                <option>חירום</option>
                <option>אחר</option>
            </select>

            <input type="number" id="days" placeholder="מספר ימים">

            <button onclick="addDay()">
                הוסף פעילות
            </button>

        </div>

        <h2 id="totalDays">
            סה"כ ימי מילואים: 0
        </h2>

        <h2>רשימת פעילויות</h2>

        <table>

            <thead>
                <tr>
                    <th>תאריך</th>
                    <th>יחידה</th>
                    <th>פעילות</th>
                    <th>ימים</th>
                    <th>פעולות</th>
                </tr>
            </thead>

            <tbody id="tableBody">

            </tbody>

        </table>

    </div>

    <script src="script.js"></script>

</body>
</html>
