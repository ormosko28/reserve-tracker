<!DOCTYPE html>
<html lang="he">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Reserve Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- LOGIN -->

    <div id="loginBox">

        <img
            src="logo.png"
            class="login-logo"
            alt="Reserve Tracker">

        <h1>מערכת ניהול ומעקב ימי מילואים</h1>

      

       <input
    type="email"
    id="emailInput"
    placeholder="הכנס כתובת מייל"
    required>

        <button onclick="login()">
            כניסה למערכת
        </button>

    </div>

    <!-- APP -->

    <div id="app">

        <!-- HEADER -->

        <header class="main-header">

            <div class="header-logo">
                <img src="logo.png" alt="Reserve Tracker">
            </div>

            <div class="header-title">

                <h1>
                    מערכת מעקב ימי מילואים
                </h1>

                <h3 id="userEmail"></h3>

                <button
                    class="logout-btn"
                    onclick="logout()">

                    התנתק

                </button>

            </div>

        </header>

        <!-- DASHBOARD -->

        <section class="stats-container">

            <div class="stat-card">

                <h4>סה"כ ימי מילואים</h4>

                <span id="totalDays">
                    0
                </span>

            </div>

            <div class="stat-card">

                <h4>מספר פעילויות</h4>

                <span id="activitiesCount">
                    0
                </span>

            </div>

            <div class="stat-card">

                <h4>יחידות שונות</h4>

                <span id="unitsCount">
                    0
                </span>

            </div>

        </section>

        <!-- FORM -->

        <section class="form-container">

            <input
                type="date"
                id="date">

            <input
                type="text"
                id="unit"
                placeholder="יחידה">

            <select id="activity">

                <option>אימון</option>
                <option>מבצעי</option>
                <option>חירום</option>
                <option>אחר</option>

            </select>

            <input
                type="number"
                id="days"
                placeholder="מספר ימים">

            <button onclick="addDay()">

                הוסף פעילות

            </button>

        </section>

        <!-- TABLE -->

        <section class="table-section">

            <h2>
                רשימת פעילויות
            </h2>

            <table>

                <thead>

                    <tr>

                        <th>תאריך</th>
                        <th>יחידה</th>
                        <th>פעילות</th>
                        <th>ימים</th>
                        <th>פעולות</th>

                    </tr>

                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </section>

    </div>

    <script src="script.js"></script>

</body>

</html>
